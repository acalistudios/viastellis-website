name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build with Vite. We do NOT run `npm run build` (tsc -b) here because the
      # project has pre-existing type errors unrelated to the bundle; Vite/esbuild
      # produces the same static output. Type-checking is handled separately.
      - name: Build
        run: npx vite build && node scripts/create-static-route-copies.mjs
        env:
          # These are PUBLIC client keys (anon key is safe to expose), supplied
          # as repo secrets so they're not committed. Add them in:
          # Settings → Secrets and variables → Actions → New repository secret
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: production
          # Stripe Price IDs — empty until these repo secrets are added at go-live.
          # While empty, /upgrade shows "not configured" (startCheckout guards on it).
          # Add via: Settings → Secrets and variables → Actions → New repository secret,
          # using the LIVE price IDs printed by scripts/setup-stripe-products.mjs.
          VITE_STRIPE_PRICE_MONTHLY: ${{ secrets.VITE_STRIPE_PRICE_MONTHLY }}
          VITE_STRIPE_PRICE_ANNUAL: ${{ secrets.VITE_STRIPE_PRICE_ANNUAL }}
          VITE_STRIPE_PRICE_PACK_TASTER: ${{ secrets.VITE_STRIPE_PRICE_PACK_TASTER }}
          VITE_STRIPE_PRICE_PACK_STANDARD: ${{ secrets.VITE_STRIPE_PRICE_PACK_STANDARD }}
          VITE_STRIPE_PRICE_PACK_VALUE: ${{ secrets.VITE_STRIPE_PRICE_PACK_VALUE }}
          VITE_STRIPE_PRICE_PACK_BULK: ${{ secrets.VITE_STRIPE_PRICE_PACK_BULK }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
