<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ViaStellis">
  <defs>
    <linearGradient id="vsGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.42" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="vsCore" cx="0.48" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="vsGlow" x="-30%" y="-30%" width="160%" height="160%">
